services:
  mysql:
    image: mysql:8.4
    container_name: ekmp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${EKMP_MYSQL_ROOT_PASSWORD:?EKMP_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ekmp
      MYSQL_USER: ekmp
      MYSQL_PASSWORD: ${EKMP_MYSQL_PASSWORD:?EKMP_MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - ekmp_mysql_data:/var/lib/mysql
      - ./db/document_center_schema.sql:/docker-entrypoint-initdb.d/01-document-center.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: ekmp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${EKMP_MINIO_ROOT_USER:?EKMP_MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${EKMP_MINIO_ROOT_PASSWORD:?EKMP_MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ekmp_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  ekmp_mysql_data:
  ekmp_minio_data:
