<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品知识管理平台 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./search.css" />
  </head>
  <body>
    <aside class="sidebar" aria-label="功能导航">
      <div class="brand">
        <div class="brand-mark">商</div>
        <div>
          <div class="brand-name">商品知识库</div>
          <div class="brand-subtitle">企业 RAG Demo</div>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-group">知识资产</div>
        <button class="nav-item" data-nav-mode="library">商品知识库</button>
        <button class="nav-item" data-nav-mode="coverage">知识覆盖</button>
        <div class="nav-group">测试与验证</div>
        <button class="nav-item" data-nav-mode="guide">知识模拟</button>
        <button class="nav-item" data-nav-mode="recall">召回测试</button>
        <div class="nav-group">监控与洞察</div>
        <button class="nav-item" data-nav-mode="lineage">知识溯源</button>
      </nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">商品知识库</h1>
          <p>基于 products_v2.xlsx 建立 MySQL 结构化存储、MaxKB 商品分段和 AI 导购问答入口。</p>
        </div>
        <div class="status">
          <span class="dot"></span>
          <span>MaxKB 商品导购应用</span>
          <span class="divider"></span>
          <span>products_v2.xlsx</span>
          <span class="divider"></span>
          <a class="admin-link" href="./admin.html">后台管理</a>
        </div>
      </header>

      <section class="mode-grid" id="modeGrid" aria-label="商品知识库入口"></section>

      <section class="main-panel" id="mainPanel">
        <div class="chat-panel">
          <div class="panel-head">
            <div>
              <h2 id="panelTitle">AI 商品导购</h2>
              <p id="panelSubtitle">输入用户需求，基于新商品知识库进行推荐和商品说明。</p>
            </div>
            <button class="icon-button" id="resetButton" title="重置">↻</button>
          </div>

          <div class="quick-row" id="quickPrompts"></div>

          <div class="conversation" id="conversation" aria-live="polite"></div>
          <div class="insight-workspace" id="insightWorkspace" hidden></div>

          <form class="composer" id="composer">
            <input id="questionInput" type="text" autocomplete="off" />
            <button type="submit">发送</button>
          </form>
        </div>

        <aside class="trace-panel" id="tracePanel">
          <div class="panel-head compact">
            <div>
              <h2>知识溯源</h2>
              <p>展示商品分段、字段覆盖和检索命中结果。</p>
            </div>
          </div>
          <div class="trace-list" id="traceList"></div>
          <div class="score-box">
            <div>
              <span>质量评分</span>
              <strong id="qualityScore">--</strong>
            </div>
            <div class="meter">
              <span id="qualityBar"></span>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
